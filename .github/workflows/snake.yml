name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk@v3
        with:
          github_user_name: tiofani03
          outputs: |
            dist/github-snake.svg?color_snake=#7F52FF&color_dots=#0f0c29,#302b63,#FF6B6B,#FFD93D,#7F52FF
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#7F52FF
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
